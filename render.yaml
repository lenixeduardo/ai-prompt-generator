services:
  # ── Backend: Fastify API ──────────────────────────────────────────
  - type: web
    name: ai-prompt-generator-api
    runtime: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ── Frontend: Next.js ────────────────────────────────────────────
  - type: web
    name: ai-prompt-generator-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: API_URL
        sync: false
